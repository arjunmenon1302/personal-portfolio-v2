# Sweep AI Configuration
# This configures Sweep to automatically read your GitHub issues, write code, and open PRs.
# Learn more at: https://docs.sweep.dev/

# The branch Sweep will use as the base for all PRs
branch: 'master'

# A description of your project to help Sweep understand the context
description: 'This is a personal portfolio for a Full-Stack Software Engineer (Next.js 16, TypeScript, Tailwind v4, Framer Motion, GSAP, Three.js). It uses a Cyber-Glassmorphism aesthetic with a dark theme.'

# Specific rules for Sweep to follow when writing code
rules:
  - 'Use TypeScript for all new files.'
  - 'For styling, use Tailwind CSS utility classes and the custom CSS variables defined in src/app/globals.css.'
  - 'Components should be functional React components.'
  - 'Always use absolute imports (e.g., @/components/...) instead of relative paths.'
  - 'Keep animations lightweight and delegate scroll effects to GSAP and micro-interactions to Framer Motion.'
  - 'Do not remove existing comments unless rewriting the entire function.'

# Directories Sweep should not modify
exclude_dirs:
  - '.github/'
  - '.next/'
  - 'node_modules/'
  - 'public/'